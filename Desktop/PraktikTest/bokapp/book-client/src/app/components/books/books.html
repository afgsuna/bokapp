<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-book me-2"></i>Mina böcker</h2>
    <a routerLink="/books/new" class="btn btn-primary">
      <i class="fas fa-plus me-2"></i>Lägg till ny bok
    </a>
  </div>

  <div *ngIf="books.length === 0" class="alert alert-info">
    <i class="fas fa-info-circle me-2"></i>Inga böcker ännu. Lägg till din första bok!
  </div>

  <div class="row">
    <div class="col-md-4 mb-3" *ngFor="let book of books">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h5 class="card-title">
            <i class="fas fa-book me-2"></i>{{ book.title }}
          </h5>
          <p class="card-text">
            <i class="fas fa-user me-2"></i>{{ book.author }}
          </p>
          <p class="card-text">
            <i class="fas fa-calendar me-2"></i>
            {{ book.publishedDate | date:'yyyy-MM-dd' }}
          </p>
        </div>
        <div class="card-footer d-flex justify-content-between">
          <a [routerLink]="['/books/edit', book.id]" class="btn btn-sm btn-warning">
            <i class="fas fa-edit me-1"></i>Redigera
          </a>
          <button class="btn btn-sm btn-danger" (click)="delete(book.id)">
            <i class="fas fa-trash me-1"></i>Radera
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
