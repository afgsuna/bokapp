<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="card-title text-center mb-4">
            <i class="fas fa-user-plus me-2"></i>Registrera
          </h3>
          <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
          <div *ngIf="success" class="alert alert-success">{{ success }}</div>
          <div class="mb-3">
            <label class="form-label">Användarnamn</label>
            <input type="text" class="form-control" [(ngModel)]="username" />
          </div>
          <div class="mb-3">
            <label class="form-label">Lösenord</label>
            <input type="password" class="form-control" [(ngModel)]="password" />
          </div>
          <button class="btn btn-success w-100" (click)="register()">
            <i class="fas fa-user-plus me-2"></i>Registrera
          </button>
          <hr />
          <p class="text-center">
            Har du redan ett konto? <a routerLink="/login">Logga in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
