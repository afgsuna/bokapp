<div class="container mt-4">
  <!-- Login -->
  <div *ngIf="!isLoggedIn" class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="card-title text-center mb-4">
            <i class="fas fa-user-shield me-2"></i>Admin Login
          </h3>
          <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
          <div class="mb-3">
            <label class="form-label">Användarnamn</label>
            <input type="text" class="form-control" [(ngModel)]="username" />
          </div>
          <div class="mb-3">
            <label class="form-label">Lösenord</label>
            <input type="password" class="form-control" [(ngModel)]="password" />
          </div>
          <button class="btn btn-danger w-100" (click)="login()">
            <i class="fas fa-sign-in-alt me-2"></i>Logga in som Admin
          </button>
          <hr />
          <p class="text-center mb-0">
            <a routerLink="/login" class="text-muted">
              <i class="fas fa-arrow-left me-1"></i>Tillbaka till login
            </a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Admin Panel -->
  <div *ngIf="isLoggedIn">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>
        <i class="fas fa-users-cog me-2"></i>Admin Panel
      </h2>
      <button class="btn btn-outline-danger" (click)="logout()">
        <i class="fas fa-sign-out-alt me-1"></i>Logga ut
      </button>
    </div>
    <div class="table-responsive">
      <table class="table table-bordered table-hover">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Användarnamn</th>
            <th>Admin</th>
            <th>Nytt lösenord</th>
            <th>Åtgärder</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of users">
            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>
              <span *ngIf="user.isAdmin" class="badge bg-danger">
                <i class="fas fa-shield-alt me-1"></i>Admin
              </span>
              <span *ngIf="!user.isAdmin" class="badge bg-secondary">
                <i class="fas fa-user me-1"></i>Användare
              </span>
            </td>
            <td>
              <div class="input-group input-group-sm">
                <input type="password" class="form-control"
                  placeholder="Nytt lösenord"
                  [(ngModel)]="resetPasswords[user.id]" />
                <button class="btn btn-warning" (click)="resetPassword(user.id)">
                  <i class="fas fa-key"></i>
                </button>
              </div>
            </td>
            <td>
              <button *ngIf="!user.isAdmin" class="btn btn-sm btn-danger" (click)="deleteUser(user.id)">
                <i class="fas fa-trash me-1"></i>Radera
              </button>
              <span *ngIf="user.isAdmin" class="text-muted">—</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
